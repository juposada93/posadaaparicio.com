name: Site quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Rebuild research pages
        run: node tools/build_research_pages.mjs
      - name: Refresh legacy CV aliases
        run: python tools/build_public_cv.py
      - name: Validate site
        run: python tools/check_site.py
      - name: Confirm generated files are committed
        run: git diff --exit-code
